    <div>

        <h1 class="contact_titre">Contact</h1>

        <div class="formulaire_simple">
            <form>
            <label class="label_simple" type="text">Nom</label>
            <input class="input_simple" required title="Mettez votre Nom">
            <label class="label_simple"><br>Prénom</label>
            <input class="input_simple" required title="Mettez votre Prénom">
            <label class="label_simple" ><br>Email</label>
            <input class="input_simple" type="email"required placeholder="@email.com"title="Mettez votre Email">
            <label class="label_simple"><br>Numéro de tèl.</label>
            <input class="input_simple" type="number"required placeholder="+41" title="Mettez votre Numéro de tèl.">
            <label class="label_simple"><br>Message</label>
            <textarea required title="Mettez votre Message"></textarea><br>
            <input type="checkbox" required class="label_simple_check">
            <label class="label_simple_check">J'accepte les conditions générales</label><br>
            <input type="submit" value="Envoyer" class="bouton_simple"></button>
            </form>
        </div>

    </div>
